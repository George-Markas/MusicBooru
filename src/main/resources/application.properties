spring.application.name=MusicBooru

spring.datasource.url=jdbc:postgresql://localhost:6432/musicbooru
spring.datasource.username=musicbooru
spring.datasource.password=supersecretpassword

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=true
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

logging.file.name=musicbooru.log
logging.level.org.example.musicbooru=DEBUG